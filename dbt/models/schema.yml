version: 2

sources:
  - name: health
    schema: health
    tables:
      - name: dim_clients
        columns:
          - name: client_key
            tests: [unique, not_null]
          - name: client_id
            tests: [unique, not_null]
      - name: dim_products
        columns:
          - name: product_key
            tests: [unique, not_null]
          - name: product_code
            tests: [unique, not_null]
      - name: fct_health_lapses
        columns:
          - name: lapse_id
            tests: [unique, not_null]
          - name: client_key
            tests: [not_null]
          - name: product_key
            tests: [not_null]
          - name: lapse_date_key
            tests: [not_null]
          - name: lapse_status
            tests:
              - not_null
              - accepted_values:
                  values: ['LAPSED', 'REINSTATED', 'CANCELLED', 'PENDING']
      - name: dim_date
        columns:
          - name: date_key
            tests: [unique, not_null]

models:
  - name: stg_clients
    columns:
      - name: client_key
        tests: [unique, not_null]
      - name: client_id
        tests: [unique, not_null]

  - name: stg_lapses
    columns:
      - name: lapse_id
        tests: [unique, not_null]
      - name: client_key
        tests: [not_null]
      - name: product_key
        tests: [not_null]
      - name: lapse_status
        tests:
          - not_null
          - accepted_values:
              values: ['LAPSED', 'REINSTATED', 'CANCELLED', 'PENDING']

  - name: stg_products
    columns:
      - name: product_key
        tests: [unique, not_null]
      - name: product_code
        tests: [unique, not_null]
      - name: product_name
        tests: [not_null]

  - name: dim_patients
    columns:
      - name: client_key
        tests: [unique, not_null]
      - name: client_id
        tests: [unique, not_null]
      - name: full_name
        tests: [not_null]
      - name: age_band
        tests:
          - not_null
          - accepted_values:
              values: ['Minor', '18-34', '35-49', '50-64', '65+']
      - name: income_band
        tests:
          - not_null
          - accepted_values:
              values: ['Low', 'Middle', 'Upper-Middle', 'High']

  - name: fct_patient_claims_summary
    columns:
      - name: client_key
        tests: [unique, not_null]
      - name: client_id
        tests: [unique, not_null]
      - name: total_lapses
        tests: [not_null]
      - name: active_lapses
        tests: [not_null]
      - name: lapse_segment
        tests:
          - not_null
          - accepted_values:
              values: ['No Lapse', 'Fully Reinstated', 'Active Lapse', 'Mixed']